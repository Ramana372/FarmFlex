spring.application.name=Backend

# ==================== LOCAL PostgreSQL Configuration ====================
# Make sure PostgreSQL is running locally on port 5444
# For production: use Supabase with environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5444/farmflex}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Ramana@2k3}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Web Configuration (API only, React frontend runs separately)
server.port=8090

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.file-size-threshold=20MB

# ==================== EMAIL CONFIGURATION ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# IMPORTANT: Use Gmail App Password, NOT your regular Gmail password!
# How to generate App Password:
# 1. Go to https://myaccount.google.com/security
# 2. Enable 2-Factor Authentication
# 3. Go to App passwords and generate one for "Mail"
# 4. Copy the 16-character app password
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.socketFactory.port=587
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.from=noreply@farmflex.com
# Optional: Display name for from email
spring.mail.properties.mail.smtp.from=noreply@farmflex.com

# ==================== JWT CONFIGURATION ====================
# JWT secret must be at least 512 bits / 64 bytes for HS512
# IMPORTANT: Change this to a secure random value in production!
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:agrimart-secret-key-for-jwt-authentication-2024}
jwt.expiration=86400000

# ==================== SUPABASE CONFIGURATION ====================
# Supabase Project Configuration
# Use environment variables in production
supabase.url=${SUPABASE_URL:https://your-project.supabase.co}
supabase.key=${SUPABASE_KEY:your-publishable-key}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}
supabase.jwt-secret=${SUPABASE_JWT_SECRET:your-jwt-secret-here}

# Supabase Storage Configuration
supabase.storage.bucket.name=farmflex-storage
supabase.storage.max-file-size=10485760
supabase.storage.allowed-extensions=jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,zip

# Supabase Auth Configuration (Optional - you can use Supabase Auth instead of custom JWT)
supabase.auth.enabled=${SUPABASE_AUTH_ENABLED:false}
supabase.auth.site-url=${SUPABASE_AUTH_SITE_URL:http://localhost:3000}
supabase.auth.redirect-url=${SUPABASE_AUTH_REDIRECT_URL:http://localhost:3000/auth/callback}

# ==================== RAZORPAY CONFIGURATION ====================
razorpay.key-id=${RAZORPAY_KEY_ID:your-razorpay-key-id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:your-razorpay-key-secret}

# ==================== LOGGING CONFIGURATION ====================
# Enable debug logging for authentication and email
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.com.example.Security=DEBUG
logging.level.com.example.Controller=DEBUG
logging.level.com.example.Service=DEBUG
logging.level.com.example.Config=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.mail=DEBUG

# Log file configuration (optional - for production)
logging.file.name=logs/farmflex.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n