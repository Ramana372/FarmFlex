spring.application.name=Backend
spring.datasource.url=jdbc:postgresql://localhost:5444/agribuy
spring.datasource.username=postgres
spring.datasource.password=Ramana@2k3

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Web Configuration (API only, React frontend runs separately)
server.port=8090

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.file-size-threshold=20MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=noreply@farmflex.com

# JWT Configuration (secret must be at least 512 bits / 64 bytes for HS512)
jwt.secret=agrimart-secret-key-for-jwt-authentication-2024-agrimart-secure-key-12345
jwt.expiration=86400000

# Frontend URL
app.frontend.url=http://localhost:3000

# Razorpay Configuration
razorpay.key-id=${RAZORPAY_KEY_ID:your-razorpay-key-id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:your-razorpay-key-secret}